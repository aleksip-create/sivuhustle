<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <title>Meta-mainoskuva 1080×1080</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .canvas {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(145deg, #0f172a 0%, #134e4a 55%, #10b981 100%);
            color: white;
            padding: 72px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .canvas::before {
            content: '';
            position: absolute;
            width: 520px;
            height: 520px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            top: -120px;
            right: -80px;
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .logo span { color: #6ee7b7; }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 10px 22px;
            border-radius: 999px;
            font-size: 22px;
            font-weight: 600;
            margin-top: 28px;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 78px;
            line-height: 1.02;
            letter-spacing: -0.04em;
            font-weight: 700;
            max-width: 900px;
            margin-top: 48px;
        }
        .sub {
            font-size: 30px;
            line-height: 1.45;
            color: #d1fae5;
            max-width: 820px;
            margin-top: 28px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: auto;
        }
        .stat {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 28px;
        }
        .stat strong {
            display: block;
            font-size: 44px;
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1;
        }
        .stat span {
            display: block;
            margin-top: 8px;
            font-size: 18px;
            color: #a7f3d0;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .cta {
            margin-top: 32px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: white;
            color: #065f46;
            font-size: 28px;
            font-weight: 700;
            padding: 22px 36px;
            border-radius: 999px;
            width: fit-content;
        }
        .hint {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #94a3b8;
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 14px;
        }
        @media print {
            body { background: white; }
            .hint { display: none; }
        }
    </style>
</head>
<body>
    <div class="canvas" id="ad">
        <div>
            <div class="logo">SivuHustle<span>.fi</span></div>
            <div class="badge">Ilmainen aloitus · Suomeksi</div>
            <h1>Rakenna sivutulo verkossa</h1>
            <p class="sub">Tulolaskuri + 8 käytännön opasta. Affiliate, digituotteet, blogi tai pieni työkalu.</p>
        </div>
        <div>
            <div class="stats">
                <div class="stat"><strong>8</strong><span>Ilmaista opasta</span></div>
                <div class="stat"><strong>1</strong><span>Tulolaskuri</span></div>
                <div class="stat"><strong>0 €</strong><span>Aloittaminen</span></div>
            </div>
            <div class="cta">Kokeile ilmaiseksi →</div>
        </div>
    </div>
    <p class="hint">Ota kuvakaappaus tai tulosta PDF (1080×1080). Tätä ei julkaista sivustolle.</p>
</body>
</html>
