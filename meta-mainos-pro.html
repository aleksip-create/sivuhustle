<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <title>Meta-mainos PRO 1080×1080</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #cbd5e1;
            font-family: 'Inter', system-ui, sans-serif;
            padding: 24px;
        }
        canvas { width: 360px; height: 360px; box-shadow: 0 25px 50px rgb(15 23 42 / 0.25); }
        button {
            background: #059669;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover { background: #047857; }
        p { color: #475569; font-size: 14px; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <canvas id="ad" width="1080" height="1080"></canvas>
    <button type="button" id="dl">Lataa mainoskuva PNG</button>
    <p>Vähän tekstiä kuvassa = Meta hyväksyy helpommin. Otsikko ja teksti tulevat mainoksen kenttiin.</p>
    <script>
        const c = document.getElementById('ad');
        const x = c.getContext('2d');
        const S = 1080;

        const bg = x.createLinearGradient(0, 0, S, S);
        bg.addColorStop(0, '#0f172a');
        bg.addColorStop(0.55, '#0f2922');
        bg.addColorStop(1, '#065f46');
        x.fillStyle = bg;
        x.fillRect(0, 0, S, S);

        x.fillStyle = 'rgba(255,255,255,0.04)';
        x.beginPath();
        x.arc(S * 0.85, S * 0.12, S * 0.28, 0, Math.PI * 2);
        x.fill();

        x.font = '700 52px "Space Grotesk", system-ui, sans-serif';
        x.fillStyle = '#f8fafc';
        x.fillText('SivuHustle', S * 0.08, S * 0.1);
        x.fillStyle = '#6ee7b7';
        x.fillText('.fi', S * 0.08 + x.measureText('SivuHustle').width + 4, S * 0.1);

        x.font = '600 28px Inter, system-ui, sans-serif';
        x.fillStyle = '#a7f3d0';
        x.fillText('Ilmainen sivutulolaskuri', S * 0.08, S * 0.155);

        const cardX = S * 0.08, cardY = S * 0.22, cardW = S * 0.84, cardH = S * 0.62, r = 40;
        x.fillStyle = '#ffffff';
        round(x, cardX, cardY, cardW, cardH, r);
        x.fill();
        x.shadowColor = 'rgba(0,0,0,0.15)';
        x.shadowBlur = 40;
        x.shadowOffsetY = 16;
        round(x, cardX, cardY, cardW, cardH, r);
        x.fill();
        x.shadowColor = 'transparent';

        x.font = '600 22px Inter, system-ui, sans-serif';
        x.fillStyle = '#64748b';
        x.fillText('ARVIOITU KK-TULO', cardX + 48, cardY + 72);

        x.font = '700 96px "Space Grotesk", system-ui, sans-serif';
        x.fillStyle = '#0f172a';
        x.fillText('2 250 €', cardX + 48, cardY + 175);

        x.font = '600 26px Inter, system-ui, sans-serif';
        x.fillStyle = '#059669';
        x.fillText('↑ realistinen arvio laskurilla', cardX + 48, cardY + 230);

        const barY = cardY + 290;
        const bars = [
            { label: 'Affiliate', pct: 0.55, color: '#10b981' },
            { label: 'Digituotteet', pct: 0.38, color: '#14b8a6' },
            { label: 'Blogi / työkalu', pct: 0.28, color: '#2dd4bf' }
        ];
        bars.forEach((b, i) => {
            const by = barY + i * 58;
            x.font = '500 22px Inter, system-ui, sans-serif';
            x.fillStyle = '#475569';
            x.fillText(b.label, cardX + 48, by);
            x.fillStyle = '#e2e8f0';
            round(x, cardX + 280, by - 22, cardW - 328, 18, 9);
            x.fill();
            x.fillStyle = b.color;
            round(x, cardX + 280, by - 22, (cardW - 328) * b.pct, 18, 9);
            x.fill();
        });

        x.fillStyle = '#0f172a';
        round(x, cardX + 48, cardY + cardH - 100, 340, 64, 32);
        x.fill();
        x.font = '700 28px Inter, system-ui, sans-serif';
        x.fillStyle = '#ffffff';
        x.fillText('Kokeile ilmaiseksi →', cardX + 78, cardY + cardH - 58);

        x.font = '500 24px Inter, system-ui, sans-serif';
        x.fillStyle = 'rgba(255,255,255,0.75)';
        x.fillText('8 opasta suomeksi · Ei luottokorttia', S * 0.08, S * 0.94);

        function round(ctx, x0, y0, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x0 + r, y0);
            ctx.arcTo(x0 + w, y0, x0 + w, y0 + h, r);
            ctx.arcTo(x0 + w, y0 + h, x0, y0 + h, r);
            ctx.arcTo(x0, y0 + h, x0, y0, r);
            ctx.arcTo(x0, y0, x0 + w, y0, r);
            ctx.closePath();
        }

        document.getElementById('dl').onclick = () => {
            const a = document.createElement('a');
            a.download = 'sivuhustle-meta-mainos.png';
            a.href = c.toDataURL('image/png');
            a.click();
        };
    </script>
</body>
</html>
